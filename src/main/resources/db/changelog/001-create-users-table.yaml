databaseChangeLog:
  - changeSet:
      id: 001
      author: vadikkamskiy
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: name
                  type: varchar(255)
              - column:
                  name: provider
                  type: varchar(50)
              - column:
                  name: created_at
                  type: timestamp